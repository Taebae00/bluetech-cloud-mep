<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueCheck 관리자</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="admin-wrap">

    <header class="admin-header">
        <div>
            <h1>BlueCheck 관리자</h1>
            <p>회원 생성, 수정, 비밀번호 변경, 삭제 관리</p>
        </div>

        <button type="button" class="back-btn" onclick="location.href='/loginOk'">
            현장 목록으로
        </button>
    </header>

    <section class="summary-section">
        <div class="summary-card">
            <span>전체 회원 수</span>
            <strong th:text="${userCount}">0</strong>
        </div>
    </section>

    <section class="admin-grid">

        <div class="form-card">
            <h2>회원 생성</h2>

            <form action="/admin/users" method="post">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" name="username" placeholder="아이디 입력" required>
                </div>

                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호 입력" required>
                </div>

                <div class="form-group">
                    <label>이름</label>
                    <input type="text" name="name" placeholder="이름 입력" required>
                </div>

                <div class="form-group">
                    <label>직급</label>
                    <select name="role" required>
                        <option value="">직급 선택</option>
                        <option value="대표">대표</option>
                        <option value="전무">전무</option>
                        <option value="이사">이사</option>
                        <option value="부장">부장</option>
                        <option value="차장">차장</option>
                        <option value="과장">과장</option>
                        <option value="주임">주임</option>
                        <option value="사원">사원</option>
                        <option value="기업">기업</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">회원 생성</button>
            </form>
        </div>

        <div class="list-card">
            <div class="list-header">
                <h2>회원 목록</h2>
            </div>

            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>아이디</th>
                        <th>이름</th>
                        <th>직급</th>
                        <th class="count-col">작성 현장 수</th>
                        <th class="date-col">생성일</th>
                        <th>관리</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="user : ${users}">
                        <td>
                            <input type="text"
                                   class="edit-username username-cell"
                                   th:value="${user.username}"
                                   disabled
                                   required>
                        </td>

                        <td>
                            <input type="text"
                                   class="edit-name"
                                   th:value="${user.name}"
                                   disabled
                                   required>
                        </td>

                        <td>
                            <select class="edit-role" disabled required>
                                <option value="대표" th:selected="${user.role == '대표'}">대표</option>
                                <option value="전무" th:selected="${user.role == '전무'}">전무</option>
                                <option value="이사" th:selected="${user.role == '이사'}">이사</option>
                                <option value="부장" th:selected="${user.role == '부장'}">부장</option>
                                <option value="차장" th:selected="${user.role == '차장'}">차장</option>
                                <option value="과장" th:selected="${user.role == '과장'}">과장</option>
                                <option value="주임" th:selected="${user.role == '주임'}">주임</option>
                                <option value="사원" th:selected="${user.role == '사원'}">사원</option>
                                <option value="기업" th:selected="${user.role == '기업'}">기업</option>
                                <option value="ADMIN" th:selected="${#strings.equalsIgnoreCase(user.role, 'ADMIN')}">ADMIN</option>
                            </select>
                        </td>

                        <td class="count-col" th:text="${user.siteCount}">0</td>

                        <td class="date-col"
                            th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'yyyy-MM-dd') : ''}">
                        </td>

                        <td class="action-cell">
                            <form th:action="@{/admin/users/{id}/update(id=${user.id})}"
                                  method="post"
                                  class="row-form update-form">

                                <input type="hidden" name="username" class="hidden-username">
                                <input type="hidden" name="name" class="hidden-name">
                                <input type="hidden" name="role" class="hidden-role">

                                <button type="button" class="small-btn edit-btn edit-mode-btn">수정</button>
                                <button type="submit" class="small-btn save-btn" style="display:none;">저장</button>
                            </form>

                            <form th:action="@{/admin/users/{id}/password(id=${user.id})}"
                                  method="post"
                                  class="row-form password-form">
                                <input type="password" name="password" placeholder="새 비밀번호" disabled required>
                                <button type="button" class="small-btn pass-btn pass-mode-btn">비밀번호 수정</button>
                                <button type="submit" class="small-btn save-pass-btn" style="display:none;">저장</button>
                            </form>

                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                  method="post"
                                  class="row-form delete-form"
                                  onsubmit="return confirm('이 회원과 작성한 현장, 점검결과, 사진 데이터가 모두 삭제됩니다. 삭제할까요?');">

                                <button type="submit"
                                        class="small-btn delete-btn"
                                        th:if="${!#strings.equalsIgnoreCase(user.role, 'ADMIN')}">
                                    삭제
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="empty-table">회원이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </section>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const params = new URLSearchParams(window.location.search);
        const result = params.get("result");

        if (result === "created") alert("회원이 생성되었습니다.");
        else if (result === "updated") alert("회원 정보가 수정되었습니다.");
        else if (result === "password") alert("비밀번호가 변경되었습니다.");
        else if (result === "deleted") alert("회원이 삭제되었습니다.");

        if (result) {
            window.history.replaceState({}, document.title, "/admin");
        }

        document.querySelectorAll(".edit-mode-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const tr = btn.closest("tr");

                const usernameInput = tr.querySelector(".edit-username");
                const nameInput = tr.querySelector(".edit-name");
                const roleSelect = tr.querySelector(".edit-role");
                const form = tr.querySelector(".update-form");

                usernameInput.disabled = false;
                nameInput.disabled = false;
                roleSelect.disabled = false;

                btn.style.display = "none";
                form.querySelector(".save-btn").style.display = "inline-block";
            });
        });

        document.querySelectorAll(".update-form").forEach(function (form) {
            form.addEventListener("submit", function () {
                const tr = form.closest("tr");

                form.querySelector(".hidden-username").value = tr.querySelector(".edit-username").value;
                form.querySelector(".hidden-name").value = tr.querySelector(".edit-name").value;
                form.querySelector(".hidden-role").value = tr.querySelector(".edit-role").value;
            });
        });

        document.querySelectorAll(".pass-mode-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const form = btn.closest(".password-form");
                const passwordInput = form.querySelector("input[name='password']");

                passwordInput.disabled = false;
                passwordInput.focus();

                btn.style.display = "none";
                form.querySelector(".save-pass-btn").style.display = "inline-block";
            });
        });
    });
</script>

</body>
</html>
