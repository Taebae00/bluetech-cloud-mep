<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueCheck</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo_row.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo_row.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo_row.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BlueCheck">

    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="wrap">

    <div class="login-card">
        <div class="logo-area">
            <img src="/images/logo_row.png" alt="BlueCheck" class="logo-img">
        </div>
        <p class="logo-subtitle">정보통신 / 기계설비 유지보수·성능점검 시스템</p>

        <form method="post" id="loginForm">

            <div class="input-group">
                <label>아이디</label>
                <input type="text" id="id" name="id" placeholder="아이디 입력">
            </div>

            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력">
            </div>

            <div class="login-options">
                <label class="check-row">
                    <input type="checkbox" id="saveId">
                    <span>아이디 저장</span>
                </label>

                <label class="check-row">
                    <input type="checkbox" id="autoLogin">
                    <span>자동 로그인</span>
                </label>
            </div>

            <button type="submit" class="login-btn">로그인</button>

        </form>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/loginJS.js?v=20260628"></script>
</body>
</html>
