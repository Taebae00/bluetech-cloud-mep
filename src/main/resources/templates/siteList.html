<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueCheck</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo_row.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo_row.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo_row.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BlueCheck">

    <link rel="stylesheet" href="/css/site-list.css">
</head>
<body>

<div class="wrap">
    <div class="top-title">BlueTech-Cloud</div>
    <div class="top-bar">
        <div class="user-info">
            <span th:text="${userName}">홍길동</span>
            <span th:text="${userRole}">USER</span>
            <span>님 안전한 점검 되세요</span>
        </div>

        <div class="top-btns">
            <button type="button"
                    class="admin-btn"
                    th:if="${#strings.equalsIgnoreCase(userRole, 'ADMIN')}"
                    onclick="location.href='/admin'">
                회원관리
            </button>

            <button type="button" id="logoutBtn" class="logout-btn">
                로그아웃
            </button>
        </div>
    </div>
    <h1 class="page-title">Site List</h1>

    <div class="site-count" th:text="'총 ' + ${list.size()} + '개의 현장'"></div>

    <div id="emptyBox" class="empty-box" th:if="${list.size() == 0}">
        기록한 현장이 없습니다.
    </div>

    <div class="site-list" id="siteListBox">
        <a class="site-card"
           th:each="site : ${list}"
           th:href="@{/site/write/{id}(id=${site.id})}">

            <div class="site-name"
                 th:text="${site.site_name} + ' 현장 ' + ${siteWorkTypeMap[site.id]}">
                테스트 현장 성능점검
            </div>

            <div class="site-info">
                <span>작성일시 :</span>
                <span th:text="${site.getCreated_at() != null ? #temporals.format(site.getCreated_at(), 'yyyy-MM-dd HH:mm') : ''}"></span>
            </div>

            <div class="go-write">작성하러 가기 →</div>
        </a>
    </div>

    <button type="button" class="add-btn" id="openSiteModal">+</button>
</div>

<div class="modal-overlay" id="siteModal" style="display: none;">
    <div class="modal-box">
        <h3 class="modal-title">현장 추가</h3>

        <div class="modal-group">
            <label class="modal-label" for="siteNameInput">현장명</label>
            <input type="text" id="siteNameInput" placeholder="현장명을 입력하세요">
        </div>

        <div class="modal-group">
            <div class="modal-label">작업유형</div>

            <div class="worktype-grid">
                <label class="worktype-item">
                    <input type="radio" name="workType" value="성능점검" checked>
                    <div class="circle"></div>
                    <span>성능점검(표준형)</span>
                </label>

                <label class="worktype-item">
                    <input type="radio" name="workType" value="성능점검(서울형)">
                    <div class="circle"></div>
                    <span>성능점검(서울형)</span>
                </label>

                <label class="worktype-item">
                    <input type="radio" name="workType" value="유지관리">
                    <div class="circle"></div>
                    <span>유지관리</span>
                </label>

                <label class="worktype-item">
                    <input type="radio" name="workType" value="현황표">
                    <div class="circle"></div>
                    <span>현황표</span>
                </label>
            </div>
        </div>

        <div class="modal-group">
            <div class="modal-label">항목 선택</div>
            <div class="category-top-btns">
                <button type="button" id="checkAllBtn">전체선택</button>
                <button type="button" id="uncheckAllBtn">전체해제</button>
            </div>
            <div id="categoryBox" class="category-box"></div>
        </div>

        <div class="modal-btn-wrap">
            <button type="button" class="modal-cancel" id="closeSiteModal">취소</button>
            <button type="button" class="modal-save" id="saveSiteBtn">저장</button>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:src="@{/js/InsertSite.js}"></script>
</body>
</html>
